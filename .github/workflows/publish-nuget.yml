name: Publish to NuGet

on:
  release:
    types: [released]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/Telnyx.net.sln

      - name: Build
        run: dotnet build ./src/Telnyx.net.sln --configuration Release /clp:ErrorsOnly

      - name: Pack
        run: dotnet pack ./src/Telnyx.net/Telnyx.net.csproj --configuration Release --output ./artifacts

      - name: NuGet Login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: Telnyx

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://www.nuget.org/api/v2/package
